<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercicio 14 </title>
</head>
<body>
    <div>
        <h1> Exercicio 14 </h1>
        <label for="text">Qual a temperatura: </label>
        <input type="number" id="temp">
        <br><br>
        <button onclick="Analisar()"> Analisar </button>
        <p id="mensagem"></p>
    </div>
    <script>
        function Analisar(){
            const temp = Number(document.getElementById("temp").value);
            if (temp > 80 ){
                document.getElementById("mensagem").innerText="Critico";
            }else if (temp > 60 ){
                document.getElementById("mensagem").innerText="Atenção";
            }else{
                document.getElementById("mensagem").innerText="Normal";
            }
        }
    </script>
    
</body>
</html>
