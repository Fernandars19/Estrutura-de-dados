<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercicio 13 </title>
</head>
<body>
    <div>
        <h1> Exercicio 13 </h1>
        <label for="text"> Digite o valor da primeira compra: </label>
        <input type="number" id="c1">
        <br><br>
        <label for="text"> Digite o valor da segunda compra: </label>
        <input type="number" id="c2">
        <br><br>
        <label for="text"> Digite o valor da terceira compra: </label>
        <input type="number" id="c3">
        <br><br>
        <button onclick="Calcular()"> Calcular </button>
        <p id="mensagem"></p>
    </div>
    <script>
        function Calcular(){
            const c1 = Number(document.getElementById("c1").value);
            const c2 = Number(document.getElementById("c2").value);
            const c3 = Number(document.getElementById("c3").value);

            if (c1 > c2 && c1 > c3){
                document.getElementById("mensagem").innerText="A primeira compra tem o maior valor";

            }else if (c2 > c1 && c2 > c3){
                document.getElementById("mensagem").innerText="A segunda compra tem o maior valor";

            }else{
                document.getElementById("mensagem").innerText="A terceira compra tem o maior valor";
            }
        }
           
    </script>
    
</body>
</html>
